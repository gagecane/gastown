description = """
Reap stale wisps and close stale issues across all Dolt databases.

The Reaper Dog executes this formula to clean up wisp and issue tables.
SQL operations are exposed via `gt reaper` CLI helpers — the Dog calls
these commands, inspects results, and uses judgment for anomalies.

## Dog Contract

This is infrastructure cleanup work:
1. Scan all production databases for candidates
2. Reap (close) wisps past max_age whose parent is closed/missing
3. Purge (delete) closed wisps past purge_age + old closed mail
4. Auto-close stale issues (>stale_issue_age, not P0/P1, not epics/convoys, no active deps)
5. Close completed convoys via `gt convoy check` (tracked-bead status, never staleness)
6. Report findings and flag anomalies

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| max_age | config | Max wisp age before reaping (default 24h) |
| purge_age | config | Max closed wisp age before purging (default 7d) |
| stale_issue_age | config | Max issue staleness before auto-close (default 30d) |
| mail_delete_age | config | Max closed mail age before purging (default 7d) |
| processed_mail_ttl | config | Max processed (read/acked) message/escalation age before close (default 1h) |
| alert_threshold | config | Open wisp count that triggers escalation (default 500) |
| dry_run | config | If "true", report without acting |
| databases | config | Comma-separated DB list (default: auto-discover) |
| dolt_port | config | Dolt server port (default 3307) |
| db_delay | config | Delay between databases to reduce Dolt load (default 250ms) |

## Safety

Reaping closes wisps — reversible (can reopen). Purging deletes rows — irreversible
but only targets already-closed wisps past retention. Auto-close only targets
issues that are not P0/P1, not epics, and have no active dependencies.

## Anomaly Detection

The Dog should watch for and flag:
- Dangling parent references (wisps referencing purged parents)
- Sudden spikes in reap candidates (suggests a wisp lifecycle problem)
- Open wisp counts exceeding alert_threshold
- Dolt commit failures (data may not be persisted)

NOT anomalies (do NOT escalate these):
- Scan/reap count mismatch (scan finds N, reap closes M < N): this is a benign
  race condition — the witness closes wisps for dead sessions concurrently.
  This is expected behavior, not a bug."""
formula = "mol-dog-reaper"
version = 3

[squash]
trigger = "on_complete"
template_type = "work"
include_metrics = true

[[steps]]
id = "scan"
title = "Scan databases for reaper candidates"
description = """
Discover databases and count candidates for each operation.

**1. List databases to scan:**
```bash
gt reaper databases --port={{dolt_port}} --json
```
Or use configured database list from {{databases}} variable.

**2. Scan each database:**
```bash
gt reaper scan --db=<name> --port={{dolt_port}} \\
  --max-age={{max_age}} --purge-age={{purge_age}} \\
  --mail-age={{mail_delete_age}} --stale-age={{stale_issue_age}} \\
  --db-delay={{db_delay}} \\
  --json
```

**3. Inspect results for anomalies:**
- Check the `anomalies` array in the JSON output
- Flag any `dangling_parent_ref` anomalies — these indicate wisps with
  parent dependency records pointing to purged/missing parents
- Raise the open-wisp-count alert via the deduplicated command (do NOT
  freeform `gt escalate` — that re-fires every cycle, gu-ka8aj):
```bash
gt reaper alert-open-wisps --threshold={{alert_threshold}} --port={{dolt_port}}
```
  This counts open wisps across all databases and escalates only when the
  threshold-breach band changes or the cooldown window elapses, so normal
  count drift no longer spams the Mayor.

**4. Decide whether to proceed:**
- If no candidates found across all databases, skip remaining steps
- If anomalies are severe, consider escalating before proceeding

**Exit criteria:** Scan complete, candidates identified, anomalies flagged."""

[[steps]]
id = "reap"
title = "Reap stale wisps"
needs = ["scan"]
description = """
Close wisps past max_age whose parent molecule is closed or missing.

**1. For each database with reap candidates:**
```bash
gt reaper reap --db=<name> --port={{dolt_port}} \\
  --max-age={{max_age}} --db-delay={{db_delay}} {{#if dry_run}}--dry-run{{/if}} --json
```

**2. Inspect results:**
- Compare reaped count to scan candidates. A mismatch (scan > reap) is NORMAL
  and expected — the witness may close wisps for dead polecat sessions between
  scan and reap. Do NOT escalate scan/reap count mismatches.
- Only escalate if reap returns an actual error (not a zero count).
- Check for any anomalies in the response

**3. Alert check:**
If total open wisps across all databases exceed {{alert_threshold}},
log a warning and consider escalating.

**Exit criteria:** All stale wisps closed (or dry-run counts reported)."""

[[steps]]
id = "close-plugin-receipts"
title = "Fast-track close plugin-run receipt wisps (gs-g9k)"
needs = ["reap"]
description = """
Close transient plugin-run receipt wisps past the fast-track TTL.

Context: Daemon dog plugins and patrol scripts (RESTART_POLECAT,
stuck-agent-dog, dolt-backup, mol-dog-*, etc.) create wisps labeled
`type:plugin-run` to record successful or no-op runs. The standard reap
step closes these after 24h, but at ~13 receipts/h × 24h the open-wisp
count can drift past {{alert_threshold}} during normal operation. This
step closes them after {{plugin_receipt_age}} (default 1h), matching the
fast-track path the daemon's inline fallback already uses.

**1. For each database:**
```bash
gt reaper close-plugin-receipts --db=<name> --port={{dolt_port}} \\
  --max-age={{plugin_receipt_age}} \\
  {{#if dry_run}}--dry-run{{/if}} --json
```

**2. Inspect results:**
- If closed count is large (e.g., >500 in one cycle), a receipt-producer
  may have spiked — note it but do not escalate; the close itself is the
  remedy.
- The Reap step (24h max_age) is a safety net for any receipts that lack
  the `type:plugin-run` label.

**Exclusions:**
- Agent heartbeat wisps (issue_type='agent') — never closed by this step
- Wisps without the `type:plugin-run` label — handled by the reap step

**Exit criteria:** Stale plugin-run receipts closed."""

[[steps]]
id = "purge"
title = "Purge old closed wisps and mail"
needs = ["close-plugin-receipts"]
description = """
Delete closed wisps past purge_age and closed mail past mail_delete_age.

**1. For each database with purge candidates:**
```bash
gt reaper purge --db=<name> --port={{dolt_port}} \\
  --purge-age={{purge_age}} --mail-age={{mail_delete_age}} \\
  --db-delay={{db_delay}} \\
  {{#if dry_run}}--dry-run{{/if}} --json
```

**2. Inspect results for anomalies:**
- Check for `dolt_commit_failed` anomalies — purged data may not be persisted
- Verify purge counts are reasonable (not suspiciously high or low)

**Safety:** Only deletes wisps that are already closed AND past the purge
retention window. Active wisps are never touched. Reverse dependency
references are cleaned up to prevent dangling parent refs.

**Exit criteria:** Old closed wisps and mail purged."""

[[steps]]
id = "flush-wisps"
title = "Flush dolt_ignored wisp working set to HEAD (gu-tqtwt)"
needs = ["purge"]
description = """
Commit the dolt_ignored wisp tables (wisps, wisp_events, wisp_labels,
wisp_comments, wisp_dependencies) to Dolt HEAD so their churn does not
accumulate unbounded in the working set.

Context: bd commits the issue tables on every op, but the wisp tables are
dolt_ignored, so bd's DOLT_COMMIT('-Am') never stages them. bd's
pre-migration dirty-table guard reads the raw dolt_diff('HEAD','WORKING')
— which DOES see ignored tables — so once the backlog is large enough,
schema-init aborts ("pending schema migrations alter pre-existing dirty
tables") and every --json/capacity query fails. The deadlock is
self-sustaining: bd's own commit path runs the same guard on connect, so
bd cannot flush the working set it needs to clear the guard. Recovering
required an out-of-band Dolt server restart (gu-tqtwt). This step runs over
the reaper's raw connection, which never invokes bd's guard, bounding the
backlog every cycle.

**1. For each database:**
```bash
gt reaper flush-wisps --db=<name> --port={{dolt_port}} \\
  {{#if dry_run}}--dry-run{{/if}} --json
```

**2. Inspect results:**
- A non-zero `flushed` count is normal on busy rigs — it is the pending
  wisp churn that was just committed to HEAD.
- Check for `dolt_commit_failed` anomalies — the working set may not have
  been persisted, leaving the backlog to keep growing.

**Safety:** Only the wisp tables are force-staged, so the commit cannot
sweep in unrelated working-set changes. No-ops cleanly when nothing pending.

**Exit criteria:** Pending wisp working-set changes committed to HEAD."""

[[steps]]
id = "auto-close"
title = "Auto-close stale issues"
needs = ["flush-wisps"]
description = """
Close issues that have been open with no status change past stale_issue_age.

**1. For each database with stale candidates:**
```bash
gt reaper auto-close --db=<name> --port={{dolt_port}} \\
  --stale-age={{stale_issue_age}} \\
  --db-delay={{db_delay}} \\
  {{#if dry_run}}--dry-run{{/if}} --json
```

**2. Inspect results:**
- Review the count of closed issues
- Verify exclusions are working (P0/P1, epics, dependency-linked issues
  should never be auto-closed)

**Exit criteria:** All eligible stale issues auto-closed."""

[[steps]]
id = "reap-hooked-mail"
title = "Reap dead-letter hooked mail (gu-hhqk)"
needs = ["auto-close"]
description = """
Close HANDOFF and other mail beads that stayed in the 'hooked' state past
the dead-letter TTL. This is the GUPP lifecycle guarantee for hooked mail
(see docs/concepts/propulsion-principle.md — "guaranteed consumer or
bounded lifetime").

Context: HANDOFF mail is placed in the issues table with status='hooked'
so 'gt hook' can find it. If a successor session never consumes the hook
(session died, rerouted, bead orphaned), the hook persists forever and
accumulates as dead-letter. The wisp reaper does not see these because
they live in the issues table, not wisps.

**1. For each database:**
```bash
gt reaper reap-hooked-mail --db=<name> --port={{dolt_port}} \\
  --ttl={{hooked_mail_ttl}} \\
  {{#if dry_run}}--dry-run{{/if}} --json
```

**2. Inspect results:**
- Verify that closed beads are legitimately dead-letter (not in-flight)
- If the closed count is large (> 50 in one cycle), investigate the
  producer — a patrol formula may be creating hooks faster than consumers
  can process them

**Exclusions (do NOT escalate if these remain hooked):**
- Agent heartbeat beads (issue_type='agent') — intentionally long-lived
- Beads labeled gt:standing-orders, gt:keep, gt:role, gt:rig

**Exit criteria:** Stale hooked mail closed with reason ttl-expired."""

[[steps]]
id = "reap-open-mail"
title = "Reap stale open coordination mail (gu-ckly)"
needs = ["reap-hooked-mail"]
description = """
Close HANDOFF and other coordination mail beads that stayed in the 'open'
or 'in_progress' state past the TTL. This closes the gap left by
auto-close (which excludes P0/P1) and reap-hooked-mail (which only sweeps
status='hooked').

Context: Witness, mayor, deacon, refinery, and the stuck-agent-dog plugin
emit transient coordination mail via `gt mail send` with priority=1 (HIGH).
These create HQ beads with status='open' and NEVER get hooked. The standard
auto-close reaper excludes P0/P1 to protect real work, so without this
sweep, each cycling witness or patrol session permanently adds a P1 bead
to `bd ready`. Operators have had to manually bulk-close 30+ such beads.

**1. For each database:**
```bash
gt reaper reap-open-mail --db=<name> --port={{dolt_port}} \\
  --ttl={{open_mail_ttl}} \\
  {{#if dry_run}}--dry-run{{/if}} --json
```

**2. Inspect results:**
- Verify that closed beads are legitimately stale coordination notes
- If the closed count is large (> 100 in one cycle), investigate the
  producer — a role template or plugin may be sending mail without a
  consumer linkage

**Exclusions (do NOT escalate if these remain open):**
- Agent heartbeat beads (issue_type='agent') — not mail, won't match
- Beads labeled gt:standing-orders, gt:keep, gt:role, gt:rig
- Beads with a live consumer_bead_id (per ConsumerAliveClause, gu-ub1l)

**Exit criteria:** Stale open mail closed with reason ttl-expired."""

[[steps]]
id = "reap-processed-mail"
title = "Reap processed message & escalation beads (gu-ctspx)"
needs = ["reap-open-mail"]
description = """
Close message and escalation beads that have been PROCESSED (read or
acknowledged) and are older than the TTL. This closes the gap left by
auto-close (excludes P0/P1), reap-hooked-mail (only status='hooked'), and
reap-open-mail (blind TTL on gt:message only, never touches gt:escalation).

Context: every escalation/mail to the mayor creates a permanent hq bead
(labeled gt:message or gt:escalation). `gt escalate ack` adds the `acked`
label; `gt mail mark-read` adds `read` + `delivery:acked` — but NEITHER
closes the bead. So fully-processed notifications stay status='open'
forever, growing the DB and polluting `bd ready`/`bd list`/reaper scans.
Operators have had to manually bulk-close 30+ such beads.

**1. For each database:**
```bash
gt reaper reap-processed-mail --db=<name> --port={{dolt_port}} \\
  --ttl={{processed_mail_ttl}} \\
  {{#if dry_run}}--dry-run{{/if}} --json
```

**2. Inspect results:**
- Verify closed beads carry a processed label (read/delivery:acked/acked)
- A large closed count on the first cycle is expected (backlog drain)

**Exclusions (do NOT escalate if these remain open):**
- Un-processed beads (no read/delivery:acked/acked label) — still need attention
- Agent heartbeat beads (issue_type='agent')
- Beads labeled gt:standing-orders, gt:keep, gt:role, gt:rig
- Beads with a live consumer_bead_id (per ConsumerAliveClause, gu-ub1l)

**Exit criteria:** Processed message/escalation beads closed with reason processed."""

[[steps]]
id = "scrub-active-mr"
title = "Scrub stale active_mr refs on agent beads (gu-dhqm)"
needs = ["reap-processed-mail"]
description = """
Re-evaluate every agent bead's `active_mr` field and clear it when the
referenced MR and source issue are both terminal.

Context: `active_mr` is set by `gt done` and cleared in exactly one place —
the refinery engineer's post-merge happy path. Every other lifecycle end
(rebase-after-push, force-close, sibling-MR landing first, wisp TTL-reap)
leaves the field dangling, where it eventually combines with cleanup_status
drift to produce permanent `idle-recovery-needed` verdicts that hold
scheduler slots.

This step uses the same `polecat.AssessActiveMR` classifier the on-demand
recovery path uses. It clears `active_mr` only when both MR and source
issue are terminal.

**Preservation invariant (gc-eysed):** polecats with cleanup_status in
{has_uncommitted, has_stash, has_unpushed} keep their `active_mr` reference
even if the assessment would otherwise clear it. The dangling ref provides
the audit trail ("this WIP was for <mr>") that the human triage path needs.

**1. Run the scrub against the town database:**
```bash
gt reaper scrub-active-mr --port={{dolt_port}} \\
  {{#if dry_run}}--dry-run{{/if}} --json
```

**2. Inspect results:**
- A non-zero `cleared` count is normal — it indicates the scrubber freed
  scheduler slots that were stuck on stale references.
- `preserved_wip` should remain > 0 only if there are genuine human-WIP
  polecats; a sudden spike suggests cleanup_status drift across the fleet.
- `still_pending` reflects polecats with legitimate in-flight MRs; this is
  the steady-state population.

**Anomaly handling:**
- `active_mr_clear_failed` anomalies are non-fatal (per-bead update errors)
  but warrant escalation if they recur across multiple cycles.

**Exit criteria:** Stale `active_mr` refs cleared; preservation invariant
honored."""

[[steps]]
id = "convoy-check"
title = "Close completed convoys (tracked-bead status, not staleness)"
needs = ["auto-close"]
description = """
Close convoys whose tracked beads are ALL closed. Convoy lifecycle is driven
by tracked-bead status, never by staleness — `gt reaper auto-close` therefore
excludes convoys entirely, and this step is what retires them (hq-jnap).

The refinery closes convoys post-merge, but tracked beads closed by other
paths (manual close, audits/sweeps, `gt done --status DEFERRED`) leave the
convoy open with nothing left to track. This step bridges that gap.

**1. Run convoy check (cross-prefix aware, town-level):**
```bash
gt convoy check {{#if dry_run}}# dry_run set: run 'gt convoy list' and report instead of closing{{/if}}
```

`gt convoy check` closes every open convoy whose tracked issues are all
closed and notifies subscribers. It NEVER closes a convoy with open tracked
issues — if a convoy looks stale but its tracked beads are open, that is a
dispatch problem to flag, not a cleanup target.

**2. Inspect results:**
- Note which convoys were closed and why
- If a convoy has been open >7d with all tracked issues open and unassigned,
  flag it in the report (stranded convoy — needs feeding, not closing)

**Exit criteria:** All completed convoys closed; stranded convoys flagged."""

[[steps]]
id = "report"
title = "Report findings and return to kennel"
needs = ["scrub-active-mr", "convoy-check"]
description = """
Generate summary and signal completion.

**1. Generate report:**
```markdown
## Reaper Dog Report

**Databases scanned**: (count)
**Wisps reaped**: (total closed stale open wisps)
**Wisps purged**: (total deleted old closed wisps)
**Mail purged**: (total deleted old closed mail)
**Issues auto-closed**: (stale > stale_issue_age, excl. epics/convoys/P0-P1/deps)
**Hooked mail ttl-expired**: (dead-letter HANDOFF/mail closed; gu-hhqk)
**Open mail ttl-expired**: (stale P1 coordination mail closed; gu-ckly)
**active_mr cleared**: (stale active_mr refs scrubbed off agent beads; gu-dhqm)
**Convoys closed**: (all tracked beads closed, via gt convoy check)
**Open wisps remaining**: (total)
**Anomalies**: (list any anomalies found)
```

**2. If anomalies were found, escalate:**
```bash
gt escalate "Reaper anomalies detected" -s MEDIUM -m "<anomaly details>"
```

**Exit criteria:** Report generated, anomalies escalated if any."""

[vars]
[vars.max_age]
description = "Max wisp age before reaping (e.g., '24h')"
default = "24h"

[vars.purge_age]
description = "Max closed wisp age before purging (e.g., '168h' = 7 days)"
default = "168h"

[vars.plugin_receipt_age]
description = "Max plugin-run receipt age before fast-track close (gs-g9k; default 1h)"
default = "1h"

[vars.stale_issue_age]
description = "Max issue staleness before auto-close (e.g., '720h' = 30 days)"
default = "720h"

[vars.mail_delete_age]
description = "Max closed mail age before purging (e.g., '168h' = 7 days)"
default = "168h"

[vars.hooked_mail_ttl]
description = "Max hooked-mail age before ttl-expired close (gu-hhqk; default 24h)"
default = "24h"

[vars.open_mail_ttl]
description = "Max open-mail age before ttl-expired close (gu-ckly; default 24h)"
default = "24h"

[vars.processed_mail_ttl]
description = "Max processed (read/acked) message/escalation age before close (gu-ctspx; default 1h)"
default = "1h"

[vars.alert_threshold]
description = "Open wisp count that triggers escalation warning"
default = "800"

[vars.dry_run]
description = "If 'true', report without modifying data"
default = ""

[vars.databases]
description = "Comma-separated database names (empty = auto-discover)"
default = ""

[vars.dolt_port]
description = "Dolt server port"
default = "3307"

[vars.db_delay]
description = "Delay between databases to reduce Dolt load"
default = "250ms"
