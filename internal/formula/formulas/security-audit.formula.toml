description = "Cross-cutting security analysis. Reviews code in parallel across secrets, dependencies, SAST/OWASP, and post-change verification aspects."
formula = "security-audit"
type = "aspect"
version = 1

[[aspects]]
id = "secrets"
title = "Secrets and Credentials Review"
focus = "Hardcoded secrets, credentials, and tokens"
description = "Scan for hardcoded secrets, credentials, API keys, and tokens in the changed scope. Flag anything that should be sourced from a secrets manager or environment instead."

[[aspects]]
id = "dependencies"
title = "Dependency Vulnerability Review"
focus = "Known vulnerabilities in dependencies"
description = "Check dependencies introduced or modified by the change for known vulnerabilities (CVEs). Flag outdated or insecure dependency versions."

[[aspects]]
id = "sast"
title = "Static Analysis and OWASP Review"
focus = "OWASP Top 10 and SAST findings"
description = "Static analysis of new code for vulnerabilities. Review for OWASP Top 10 issues: injection, broken authentication, sensitive data exposure, and similar classes."

[[aspects]]
id = "verification"
title = "Post-Change Security Verification"
focus = "No new vulnerabilities introduced"
description = "Final verification that the change introduces no new vulnerabilities before merge. Confirm prior security findings are resolved and the change is safe to land."
